<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Expert Game Reviews</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: #e0e0e0; }
        .card { background-color: #1e1e1e; border: 1px solid #333; }
        .rating-badge { font-size: 1.5rem; font-weight: bold; color: #ffc107; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark mb-5">
        <div class="container">
            <a class="navbar-brand fw-bold text-danger" href="{% url 'home' %}">🎮 GG_NEWS</a>
            <a href="{% url 'home' %}" class="btn btn-outline-light btn-sm">Back to Feed</a>
        </div>
    </nav>

    <div class="container">
        <h2 class="text-warning mb-4">🎯 Game Reviews & Ratings</h2>
        <div class="row">
            {% for review in reviews %}
                <div class="col-md-6 mb-4">
                    <div class="card h-100 p-3">
                        <div class="d-flex justify-content-between align-items-center mb-2">
                            <h4 class="text-white mb-0">{{ review.game_name }}</h4>
                            <span class="rating-badge">⭐ {{ review.rating }}/10</span>
                        </div>
                        <p class="text-muted">{{ review.summary|truncatewords:25 }}</p>
                        <a href="{% url 'review_detail' review.slug %}" class="btn btn-sm btn-outline-warning mt-auto">Read Full Review</a>
                    </div>
                </div>
            {% empty %}
                <p class="text-muted">No reviews have been written yet.</p>
            {% endfor %}
        </div>
    </div>
</body>
</html>
