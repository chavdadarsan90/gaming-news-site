<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Join GG_NEWS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: #e0e0e0; }
        .card { background-color: #1e1e1e; border: none; color: white; }
        .form-control { background-color: #2b2b2b; border: 1px solid #444; color: white; }
        .form-control:focus { background-color: #333; color: white; border-color: #dc3545; box-shadow: none; }
    </style>
</head>
<body>
    <div class="container d-flex justify-content-center align-items-center min-vh-100">
        <div class="card p-4 shadow" style="width: 400px;">
            <h3 class="text-center text-danger mb-4">Create Account</h3>
            <form method="POST">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-danger w-100 mt-3">Sign Up</button>
            </form>
            <p class="mt-3 text-center small text-muted">Already have an account? <a href="{% url 'login' %}" class="text-warning text-decoration-none">Log In</a></p>
        </div>
    </div>
</body>
</html>
