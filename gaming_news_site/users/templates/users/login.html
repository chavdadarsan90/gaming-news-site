<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - GG_NEWS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: #e0e0e0; }
        .card { background-color: #1e1e1e; border: none; color: white; }
        .form-control { background-color: #2b2b2b; border: 1px solid #444; color: white; }
    </style>
</head>
<body>
    <div class="container d-flex justify-content-center align-items-center min-vh-100">
        <div class="card p-4 shadow" style="width: 400px;">
            <h3 class="text-center text-warning mb-4">Welcome Back</h3>
            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-warning w-100 mt-2 text-dark fw-bold">Log In</button>
            </form>
            <p class="mt-3 text-center small text-muted">New gamer? <a href="{% url 'register' %}" class="text-danger text-decoration-none">Create an account</a></p>
        </div>
    </div>
</body>
</html>
